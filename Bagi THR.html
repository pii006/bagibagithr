<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌙 THR Gacha</title>
  <link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@700&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Confetti canvas (jackpot effect) -->
  <canvas id="cfx"></canvas>

  <!-- Animated background decorations -->
  <div id="stars"></div>
  <div class="rope"></div>
  <div class="lanterns" id="lanterns"></div>

  <!-- Main app wrapper -->
  <div class="wrap">

    <!-- Header -->
    <div>
      <h1>🌙 Tarik THR</h1>
      <div class="sub">Ramadan Kareem • Eid Mubarak</div>
    </div>

    <!-- Spin wheel -->
    <div class="wheel-area">
      <div class="ring-out"></div>
      <div class="ring-mid"></div>
      <div class="glow" id="glow"></div>

      <!-- Fixed pointer arrow — does NOT spin with wheel -->
      <svg class="pointer" width="30" height="24" viewBox="0 0 30 24">
        <polygon points="15,22 2,2 28,2" fill="#F0C040" stroke="rgba(255,255,255,.2)" stroke-width="1.5" stroke-linejoin="round"/>
        <polygon points="15,22 2,2 28,2" fill="url(#pg)"/>
        <defs>
          <linearGradient id="pg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#fff" stop-opacity=".4"/>
            <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
          </linearGradient>
        </defs>
      </svg>

      <!-- Wheel drawn by canvas API in script.js -->
      <canvas id="wheel"></canvas>

      <!-- Center hub decorative element -->
      <div class="hub">🎁</div>
    </div>

    <!-- Spin button -->
    <button class="btn" id="btn" onclick="spin()">🎰 Putar Sekarang!</button>

    <!-- Result badge (hidden until spin completes) -->
    <div class="badge" id="badge">
      <div class="badge-lbl">Hasil Putaran</div>
      <div class="badge-val" id="bval">—</div>
      <div class="badge-msg" id="bmsg"></div>
    </div>

    <!-- Spin history chips -->
    <div class="hist" id="hist"></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
